<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Center — 2026 Midterms</title>
<style>
  :root{
    --bg:#0e1420; --panel:#0a0f18; --panel-2:#111a29; --line:#1e2a3d; --land:#16202f;
    --ink:#e8edf5; --ink-dim:#8b98ac;
    --sd:#1f5fc4; --ld:#3f7fdd; --nd:#6fa3ec; --td:#a9c8f4;
    --tr:#f0b3b3; --nr:#e88a8a; --lr:#d95c5c; --sr:#b93838;
    --ind:#b48ce0; --split:#8a6cc0; --vac:#3a4557; --money:#d9b45c; --focus:#6ea8ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Archivo","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
  .num{font-family:"IBM Plex Mono","SF Mono",Consolas,monospace}
  button{font-family:inherit}
  header{border-bottom:1px solid var(--line);background:var(--panel);padding:14px 22px 12px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
  .title h1{font-size:18px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
  .title .sub{font-size:11px;color:var(--ink-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
  .countdown{display:flex;gap:10px;text-align:center}
  .cd-cell .num{font-size:20px;font-weight:600}
  .cd-cell .lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim)}
  .topline{display:flex;gap:22px}
  .top-stat .v{font-size:16px;font-weight:700}
  .top-stat .k{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim)}
  .top-stat .v .d{color:var(--nd)} .top-stat .v .r{color:var(--lr)}
  .seatbar-wrap{margin-top:12px;position:relative}
  .seatbar{display:flex;height:16px;border-radius:4px;overflow:hidden;background:var(--vac)}
  .seatbar div{height:100%}
  .tick{position:absolute;top:-4px;bottom:22px;left:50%;width:2px;background:var(--ink)}
  .tick::after{content:"218 to win";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.08em;color:var(--ink-dim);white-space:nowrap}
  .seatbar-nums{display:flex;justify-content:space-between;font-size:12px;margin-top:4px}
  .seatbar-nums .d{color:var(--nd);font-weight:700}.seatbar-nums .r{color:var(--lr);font-weight:700}.seatbar-nums .mid{color:var(--ink-dim);font-size:10px}
  #body{flex:1;display:flex;overflow:hidden}
  aside{width:300px;min-width:300px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .tabs{display:flex;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;background:none;border:0;color:var(--ink-dim);padding:11px 0;font-size:12px;letter-spacing:.05em;cursor:pointer;border-bottom:2px solid transparent}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--focus);font-weight:600}
  .tabs button:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
  .filters{padding:12px 16px;border-bottom:1px solid var(--line)}
  .filters label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin:9px 0 4px}
  .filters label:first-child{margin-top:0}
  select,input[type=text]{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:7px 9px;font-size:13px;font-family:inherit}
  select:focus-visible,input:focus-visible{outline:2px solid var(--focus)}
  #list{flex:1;overflow-y:auto;padding:6px 8px}
  #list::-webkit-scrollbar{width:8px}#list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .row{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;cursor:pointer;border:1px solid transparent}
  .row:hover{background:var(--panel-2)}
  .row.sel{background:var(--panel-2);border-color:var(--line)}
  .chip{width:12px;height:12px;border-radius:3px;flex:none}
  .row .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .st{font-size:10.5px;color:var(--ink-dim)}
  .count-line{font-size:11px;color:var(--ink-dim);padding:7px 16px;border-bottom:1px solid var(--line)}
  .lhead{display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);padding:10px 10px 4px;position:sticky;top:0;background:var(--panel);z-index:2}
  .lhead .n{font-family:"IBM Plex Mono",monospace}
  main{flex:1;position:relative;overflow:hidden}
  #svgwrap{position:absolute;inset:0;cursor:grab}
  #svgwrap.grabbing{cursor:grabbing}
  svg{width:100%;height:100%;display:block}
  .stshape{fill:var(--land);stroke:var(--line);stroke-width:1;vector-effect:non-scaling-stroke}
  .stshape.sen{cursor:pointer}
  .stshape.sen:hover{stroke:#fff}
  .stshape.dim{opacity:.25}
  .leader{stroke:var(--ink-dim);stroke-width:.7;opacity:.6}
  .dsq{stroke:#0e1420;stroke-width:.5;cursor:pointer;vector-effect:non-scaling-stroke}
  .dsq:hover{stroke:#fff;stroke-width:1.4}
  .dsq.dim{opacity:.14}
  .stoutline{fill:none;stroke:#020409;stroke-width:1.15;vector-effect:non-scaling-stroke;pointer-events:none}
  .upseat{stroke:var(--money);stroke-width:2}
  .stlbl{fill:var(--ink-dim);font-size:8px;font-family:"IBM Plex Mono",monospace;letter-spacing:.05em;pointer-events:none;text-anchor:middle}
  .zoomctl{position:absolute;left:14px;bottom:14px;display:flex;flex-direction:column;gap:6px;z-index:20}
  .zoomctl button{width:32px;height:32px;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:6px;font-size:16px;cursor:pointer}
  .zoomctl button:hover{border-color:var(--ink-dim)}
  .legend{position:absolute;left:14px;top:12px;background:rgba(10,15,24,.9);border:1px solid var(--line);border-radius:8px;padding:10px 12px;z-index:20;font-size:10px}
  .legend .t{letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:6px}
  .lg-scale{display:flex;gap:2px;margin-bottom:5px}
  .lg-scale span{width:22px;height:10px;border-radius:2px}
  .lg-labels{display:flex;justify-content:space-between;color:var(--ink-dim)}
  .lg-extra{display:flex;align-items:center;gap:6px;margin-top:6px;color:var(--ink-dim)}
  .lg-extra i{width:10px;height:10px;border-radius:2px;display:inline-block;border:1.4px solid var(--money);background:transparent}
  .modebtn{position:absolute;right:14px;top:12px;z-index:20;display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .modebtn button{background:var(--panel);border:0;color:var(--ink-dim);padding:7px 12px;font-size:11px;cursor:pointer}
  .modebtn button.on{background:var(--panel-2);color:var(--ink);font-weight:600}
  #tt{position:absolute;pointer-events:none;background:rgba(10,15,24,.95);border:1px solid var(--line);border-radius:6px;padding:7px 10px;font-size:11.5px;z-index:40;display:none;max-width:240px;line-height:1.45}
  #board{position:absolute;inset:0;overflow-y:auto;padding:18px 24px;display:none}
  #board::-webkit-scrollbar{width:8px}#board::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .cat{margin-bottom:18px}
  .cat h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;gap:8px;align-items:center}
  .cat h3 .n{color:var(--ink-dim);font-weight:400}
  .cat .grid{display:flex;flex-wrap:wrap;gap:5px}
  .tag{font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;border:1px solid transparent;background:var(--panel-2)}
  .tag:hover{border-color:var(--ink)}
  .tag b{font-weight:700}
  .tag .who{opacity:.85}
  #detail{position:absolute;top:0;right:0;height:100%;width:340px;z-index:50;background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .2s ease;display:flex;flex-direction:column}
  @media (prefers-reduced-motion:reduce){#detail{transition:none}}
  #detail.open{transform:translateX(0)}
  .d-head{padding:16px 18px 12px;border-bottom:1px solid var(--line);position:relative}
  .d-close{position:absolute;top:10px;right:10px;background:none;border:0;color:var(--ink-dim);font-size:18px;cursor:pointer;padding:4px}
  .d-close:hover{color:var(--ink)}
  .d-rating{display:inline-block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-weight:700;margin-bottom:7px;color:#0b0f16}
  .d-head h2{font-size:18px;font-weight:700}
  .d-head .seat{font-size:12px;color:var(--ink-dim);margin-top:3px}
  .d-body{flex:1;overflow-y:auto;padding:14px 18px}
  .d-sec{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin:14px 0 7px}
  .d-sec:first-child{margin-top:0}
  .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .kv .k{color:var(--ink-dim)}.kv .v{font-weight:600}.kv .v.money{color:var(--money)}
  .note{font-size:11.5px;color:var(--ink-dim);line-height:1.5;margin-top:7px}
  .cta{width:100%;margin-top:4px;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px;font-size:12.5px;cursor:pointer}
  .cta:hover{border-color:var(--ink-dim)}
  .keyrow{padding:9px 18px;border-top:1px solid var(--line)}
  .keyrow label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);display:block;margin-bottom:3px}
  .keyrow input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;color:var(--ink);padding:6px 8px;font-size:11.5px;font-family:inherit}
  @media(max-width:860px){aside{width:250px;min-width:250px}#detail{width:100%}.topline{display:none}}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="title"><h1>Election Center</h1><div class="sub">2026 Midterms · House &amp; Senate</div></div>
    <div class="countdown" id="countdown" aria-label="Countdown to November 3, 2026"></div>
    <div class="topline">
      <div class="top-stat"><div class="v" id="tl-current">—</div><div class="k">Current House</div></div>
      <div class="top-stat"><div class="v" id="tl-proj">—</div><div class="k">Ratings-based projection</div></div>
      <div class="top-stat"><div class="v" id="tl-comp">—</div><div class="k">Competitive seats</div></div>
    </div>
  </div>
  <div class="seatbar-wrap">
    <div class="seatbar" id="seatbar"></div>
    <div class="tick"></div>
    <div class="seatbar-nums"><span class="d num" id="sb-d">—</span><span class="mid">435 seats · snapshot July 2026</span><span class="r num" id="sb-r">—</span></div>
  </div>
</header>

<div id="body">
  <aside>
    <div class="tabs">
      <button class="on" data-tab="house">House Map</button>
      <button data-tab="senate">Senate</button>
      <button data-tab="board">Ratings</button>
      <button data-tab="counties">Counties</button>
    </div>
    <div class="filters">
      <label for="f-rating">Rating</label>
      <select id="f-rating">
        <option value="">All ratings</option>
        <option>Solid D</option><option>Likely D</option><option>Lean D</option><option>Tilt D</option>
        <option>Tilt R</option><option>Lean R</option><option>Likely R</option><option>Solid R</option>
        <option value="COMP">Competitive only (Tilt + Lean)</option>
        <option value="FLIP">Rated to flip</option>
      </select>
      <label for="f-party">Held by</label>
      <select id="f-party"><option value="">Any party</option><option value="D">Democrat</option><option value="R">Republican</option><option value="I">Independent</option><option value="V">Vacant / open</option></select>
      <label for="f-state">State</label>
      <select id="f-state"><option value="">All states</option></select>
      <label for="f-q">Search</label>
      <input type="text" id="f-q" placeholder="Member or district…" autocomplete="off">
    </div>
    <div class="count-line" id="count-line"></div>
    <div id="list" tabindex="0"></div>
    <div class="keyrow">
      <label for="fec-key">FEC API key (free at api.data.gov)</label>
      <input id="fec-key" value="DEMO_KEY" spellcheck="false">
    </div>
  </aside>

  <main>
    <div id="svgwrap"><svg id="map" viewBox="0 0 975 610" role="img" aria-label="2026 US election map"></svg></div>
    <div class="legend" id="legend">
      <div class="t">Race rating</div>
      <div class="lg-scale">
        <span style="background:var(--sd)"></span><span style="background:var(--ld)"></span><span style="background:var(--nd)"></span><span style="background:var(--td)"></span>
        <span style="background:var(--tr)"></span><span style="background:var(--nr)"></span><span style="background:var(--lr)"></span><span style="background:var(--sr)"></span>
      </div>
      <div class="lg-labels"><span>Solid D</span><span>Tilt</span><span>Solid R</span></div>
      <div class="lg-extra"><i style="background:repeating-linear-gradient(45deg,var(--lr) 0 3px,rgba(255,255,255,.45) 3px 5px);border:0"></i> Rated to flip from current party</div>
      <div class="lg-extra" style="max-width:150px;line-height:1.4">Boundaries: 118th Congress lines; mid-decade redistricted states approximate</div>
    </div>
    <div class="modebtn" id="modebtn">
      <button class="on" data-m="rating">Rating</button>
      <button data-m="party">Current party</button>
    </div>
    <div class="zoomctl">
      <button id="z-in" aria-label="Zoom in">+</button>
      <button id="z-out" aria-label="Zoom out">−</button>
      <button id="z-reset" aria-label="Reset view" style="font-size:11px">⟲</button>
    </div>
    <div id="board"></div>
    <div id="tt"></div>
    <section id="detail" aria-label="Detail">
      <div class="d-head">
        <button class="d-close" id="d-close" aria-label="Close">×</button>
        <span class="d-rating" id="d-rating"></span>
        <h2 id="d-name"></h2>
        <div class="seat" id="d-seat"></div>
      </div>
      <div class="d-body" id="d-body"></div>
    </section>
  </main>
</div>

const pendingRequests = new Map();
async function backendGet(path){
  if(location.protocol!=="http:"&&location.protocol!=="https:") return null;
  if(pendingRequests.has(path)) return pendingRequests.get(path);
  const request = fetch(path,{headers:{Accept:"application/json"}})
    .then(async r=>{
      const text = await r.text();
      let data;
      try{ data = JSON.parse(text); }catch{ return null; }
      if(!r.ok) return null;
      return data;
    })
    .catch(()=>null)
    .finally(()=>pendingRequests.delete(path));
  pendingRequests.set(path, request);
  return request;
}

  const hrs=Math.floor(ms/36e5); ms-=hrs*36e5;

  document.getElementById("countdown").innerHTML=[[days,"Days"],[hrs,"Hrs"],[mins,"Mins"],[secs,"Secs"]]
    .map(([v,l])=>`<div class="cd-cell"><div class="num">${String(v).padStart(2,"0")}</div><div class="lbl">${l}</div></div>`).join("");
}

function districtFill(x){ return mode==="party"?PCOLOR(x.party):(x.rating?RCOLOR[RANK[x.rating]]:css("--vac")); }
function passes(x){
  if(filt.state&&x.st!==filt.state)return false;
  if(filt.party&&(filt.party==="V"?x.party!=="V":x.party!==filt.party))return false;
  if(filt.rating==="COMP"){if(!(x.rating&&RANK[x.rating]>=2&&RANK[x.rating]<=5))return false;}
  else if(filt.rating==="FLIP"){if(!x.flip)return false;}
  else if(filt.rating&&x.rating!==filt.rating)return false;
  if(filt.q&&!((x.label+" "+(x.m?x.m.n:"open vacant")).toLowerCase().includes(filt.q)))return false;
  return true;
}

function drawBase(interactive){
  for(const st of Object.keys(STATES)){

      p.style.fill = pair.length? (ps.length===1?PCOLOR(ps[0]):css("--split")) : css("--land");
      const up=pair.some(m=>m.e.startsWith("2027"));
      if(up) p.classList.add("upseat");
      if(filt.state&&st!==filt.state || filt.party&&!pair.some(m=>m.p===filt.party) || filt.q&&!pair.some(m=>m.n.toLowerCase().includes(filt.q))) p.classList.add("dim");

      p.addEventListener("mouseleave",hideTT);

}

// Diagonal-stripe patterns for flip districts (rated color + light stripe)
function buildDefs(){

}

/* ---------- Zoom / pan ---------- */
const wrap=document.getElementById("svgwrap");
function zoom(f,px,py){
  const nw=Math.max(120,Math.min(view.w/f,home.w*1.4)), k=nw/view.w;
  const mx=view.x+(px??.5)*view.w, my=view.y+(py??.5)*view.h;
  view={x:mx-(mx-view.x)*k,y:my-(my-view.y)*k,w:nw,h:view.h*k}; applyView();
}
wrap.addEventListener("wheel",e=>{e.preventDefault();
  const r=wrap.getBoundingClientRect();
  zoom(e.deltaY<0?1.18:1/1.18,(e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height);},{passive:false});
let drag=null,moved=false;
wrap.addEventListener("pointerdown",e=>{drag={x:e.clientX,y:e.clientY};moved=false;wrap.classList.add("grabbing")});
window.addEventListener("pointermove",e=>{if(!drag)return;
  const r=wrap.getBoundingClientRect();
  const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
  if(Math.abs(dx)+Math.abs(dy)>2)moved=true;
  view.x-=dx*view.w/r.width; view.y-=dy*view.h/r.height;
  drag={x:e.clientX,y:e.clientY}; applyView();});
window.addEventListener("pointerup",()=>{drag=null;wrap.classList.remove("grabbing")});

function renderList(){
  const list=document.getElementById("list"); list.innerHTML="";
  if(tab==="senate"){
    const rows=SENATORS.filter(m=>(!filt.state||m.s===filt.state)&&(!filt.party||m.p===filt.party)&&(!filt.q||m.n.toLowerCase().includes(filt.q)))
      .sort((a,b)=>a.s===b.s?(a.k||0)-(b.k||0):a.s.localeCompare(b.s));
    const up=rows.filter(m=>m.e.startsWith("2027")), rest=rows.filter(m=>!m.e.startsWith("2027"));
    document.getElementById("count-line").textContent=rows.length+" senators · "+up.length+" seats on the 2026 ballot";

    if(rest.length){ lhead(list,"Not up until 2028+",rest.length); rest.forEach(m=>senRow(list,m)); }
  }else{
    const rows=DISTRICTS.filter(passes);
    document.getElementById("count-line").textContent=rows.length+" districts shown";
    // States A to Z, districts in numeric order within each state
    Object.keys(STATE_NAMES).sort((a,b)=>STATE_NAMES[a].localeCompare(STATE_NAMES[b])).forEach(st=>{
      const items=rows.filter(x=>x.st===st).sort((a,b)=>a.d-b.d);
      if(!items.length)return;
      lhead(list,STATE_NAMES[st],items.length+(items.length===1?" seat":" seats"));

async function loadFEC(m,outId){
  const out=document.getElementById(outId);
  const key=document.getElementById("fec-key").value.trim()||"DEMO_KEY";
  out.innerHTML=`<p class="note">Fetching FEC filings…</p>`;
  const bk=await backendGet(`/api/fec-totals?cand=${m.f||""}&q=${encodeURIComponent(m.l)}&office=${m.c==="sen"?"S":"H"}&state=${m.s}`);
  if(bk&&bk.totals){ renderFEC(out,bk.totals,bk.candidate_id,m,outId); return; }
  try{
    let cid=m.f;
    if(!cid){
      const sr=await(await fetch(`https://api.open.fec.gov/v1/candidates/search/?api_key=${key}&q=${encodeURIComponent(m.l)}&office=${m.c==="sen"?"S":"H"}&state=${m.s}&per_page=5`)).json();
      cid=sr.results&&sr.results[0]&&sr.results[0].candidate_id;
    }
    if(!cid)throw new Error("no candidate ID found");
    const tr=await(await fetch(`https://api.open.fec.gov/v1/candidate/${cid}/totals/?api_key=${key}&sort=-cycle&per_page=1`)).json();
    const t=tr.results&&tr.results[0];
    if(!t)throw new Error("no totals filed");
    renderFEC(out,t,cid,m,outId);
  }catch(err){
    out.innerHTML=`<p class="note">FEC lookup failed (${err.message}). In the chat preview outside requests are blocked — download and open in a browser. Otherwise the DEMO_KEY hourly limit may be hit.</p>
    <button class="cta">Try again</button>`;
    out.querySelector("button").onclick=()=>loadFEC(m,outId);
  }
}

function renderFEC(out,t,cid,m,outId){
  const burn = (t.disbursements&&t.receipts)? (100*t.disbursements/t.receipts).toFixed(0)+"%" : "—";
  out.innerHTML=`
    <div class="kv"><span class="k">Cycle</span><span class="v num">${t.cycle}</span></div>
    <div class="kv"><span class="k">Raised</span><span class="v num money">${fmtUSD(t.receipts)}</span></div>
    <div class="kv"><span class="k">Spent</span><span class="v num money">${fmtUSD(t.disbursements)}</span></div>
    <div class="kv"><span class="k">Cash on hand</span><span class="v num money">${fmtUSD(t.last_cash_on_hand_end_period)}</span></div>
    <div class="kv"><span class="k">Burn rate</span><span class="v num">${burn}</span></div>
    <div class="kv"><span class="k">Debt</span><span class="v num">${fmtUSD(t.last_debts_owed_by_committee)}</span></div>
    <div class="kv"><span class="k">Through</span><span class="v num">${t.coverage_end_date?t.coverage_end_date.slice(0,10):"—"}</span></div>
    <p class="note">FEC ID ${cid}. Burn rate = spending / receipts.</p>`;
}
async function loadRace(x){
  const out=document.getElementById("race-out"); if(!out)return;
  out.innerHTML=`<p class="note">Fetching every candidate FEC has on file for this seat…</p>`;
  const districtNum = APPORTION[x.st]===1 ? "00" : String(x.d).padStart(2,"0");
  const d = await backendGet(`/api/fec-race?state=${x.st}&district=${districtNum}&office=H&cycle=2026`);
  if(!d||!d.candidates){
    out.innerHTML=`<p class="note">Live race data needs the site backend deployed with a free FEC key — this pulls every filed candidate for ${x.label} by seat, not by guessing names.</p>`;
    return;
  }
  if(!d.candidates.length){ out.innerHTML=`<p class="note">FEC has no candidates filed yet for ${x.label} this cycle.</p>`; return; }
  out.innerHTML = d.candidates.map(c=>{
    const t=c.totals;
    const pc = c.party==="DEM"?"var(--nd)":c.party==="REP"?"var(--lr)":"var(--ind)";
    return `<div style="border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px">
      <div style="font-weight:700">${c.name} <span style="color:${pc};font-weight:600">(${c.party||"?"})</span></div>
      ${c.incumbent_challenge?`<div class="note" style="margin-top:1px">${c.incumbent_challenge}</div>`:""}
      ${t?`<div class="kv"><span class="k">Raised</span><span class="v num money">${fmtUSD(t.receipts)}</span></div>
      <div class="kv"><span class="k">Spent</span><span class="v num money">${fmtUSD(t.disbursements)}</span></div>
      <div class="kv"><span class="k">Cash on hand</span><span class="v num money">${fmtUSD(t.cash_on_hand)}</span></div>`
      :`<p class="note">No totals filed yet.</p>`}
    </div>`;
  }).join("")+`<p class="note">Source: FEC candidates &amp; totals API, 2026 cycle. Every candidate FEC has registered for this seat — including primary challengers.</p>`;
}
async function loadCensus(x){
  const out=document.getElementById("census-out"); if(!out)return;
  out.innerHTML=`<p class="note">Loading ACS profile…</p>`;
  const d=await backendGet(`/api/census-district?state=${x.st}&cd=${APPORTION[x.st]===1?0:x.d}`);
  if(!d||!d.profile){ out.innerHTML=`<p class="note">District demographics come from the Census ACS API through the site backend (free key). Run the server from the starter kit to see population, income, education, age, poverty and homeownership here.</p>`; return; }
  const p=d.profile;
  out.innerHTML=Object.entries(p).map(([k,v])=>`<div class="kv"><span class="k">${k}</span><span class="v num">${v}</span></div>`).join("")+
    `<p class="note">ACS 5-year estimates · district context, not candidate points.</p>`;
}
async function loadPolls(x) {
  const out = document.getElementById("poll-out");
  if (!out) return;
  const raceId = `${x.st}-H-${String(x.d).padStart(2, "0")}-2026`;
  const [pollData, averageData] = await Promise.all([
    backendGet(`/api/polls?race_id=${encodeURIComponent(raceId)}`),
    backendGet(`/api/poll-average?race_id=${encodeURIComponent(raceId)}`)
  ]);
  if (!pollData || !pollData.polls) {
    out.innerHTML = `<p class="note">No open live polling feed exists. With the site deployed, approved polls in api/polls-data.json appear here with a transparent weighted average.</p>`;
    return;
  }
  if (!pollData.polls.length) {
    out.innerHTML = `<p class="note">No approved polls for ${raceId} yet.</p>`;
    return;
  }
  const average = averageData?.average || [];
  const averageHtml = average.map(result => `
    <div class="kv">
      <span class="k">${escapeHtml(result.candidate)} · weighted avg</span>
      <span class="v num">${Number(result.percentage).toFixed(1)}%</span>
    </div>
  `).join("");
  const pollHtml = pollData.polls.map(poll => {
    const results = (poll.results || []).map(result =>
      `${escapeHtml(result.candidate)} ${Number(result.percentage).toFixed(1)}%`
    ).join(" · ");
    return `<p class="note">
      <b>${escapeHtml(poll.pollster)}</b> ·
      ${escapeHtml(poll.endDate || "")} ·
      n=${poll.sampleSize || "?"} ${escapeHtml(poll.population || "")}<br>
      ${results}${poll.undecided != null ? ` · Undecided ${poll.undecided}%` : ""}
    </p>`;
  }).join("");
  out.innerHTML = averageHtml + pollHtml;
}
/* ---------- Counties tab ---------- */
async function renderCounties(){
  const board=document.getElementById("board");
  document.getElementById("list").innerHTML="";
  if(!filt.state){
    board.innerHTML=`<p class="note" style="padding:20px">Pick a state from the "State" filter above to see its counties.</p>`;
    document.getElementById("count-line").textContent="Pick a state to browse counties";
    return;
  }
  board.innerHTML=`<p class="note" style="padding:20px">Loading counties…</p>`;
  const d=await backendGet(`/api/census-county?state=${filt.state}`);
  if(!d||!d.counties){
    board.innerHTML=`<p class="note" style="padding:20px">County demographics come from the Census ACS API through the site backend. Deploy with a free Census key to see population, income, education and poverty for every county in ${STATE_NAMES[filt.state]}.</p>`;
    document.getElementById("count-line").textContent="Backend not available";
    return;
  }
  document.getElementById("count-line").textContent=d.counties.length+" counties in "+STATE_NAMES[filt.state];
  const sec=document.createElement("div"); sec.className="cat";
  sec.innerHTML=`<h3>${STATE_NAMES[filt.state]} counties <span class="n num">${d.counties.length}</span></h3>`;
  const grid=document.createElement("div"); grid.className="grid";
  d.counties.forEach(c=>{
    const t=document.createElement("span"); t.className="tag";
    t.innerHTML=`<b>${c.name.replace(", "+STATE_NAMES[filt.state],"")}</b>`;
    t.onclick=()=>selectCounty(c);
    grid.appendChild(t);
  });
  sec.appendChild(grid);
  board.innerHTML=""; board.appendChild(sec);
}
function selectCounty(c){
  const rEl=document.getElementById("d-rating");
  rEl.style.background="var(--panel-2)"; rEl.style.color="var(--ink-dim)"; rEl.textContent="County";
  document.getElementById("d-name").textContent=c.name;
  document.getElementById("d-seat").textContent="Census ACS 5-year estimates";
  document.getElementById("d-body").innerHTML=`
    <div class="d-sec">Demographics</div>
    <div class="kv"><span class="k">Population</span><span class="v num">${c.population||"—"}</span></div>
    <div class="kv"><span class="k">Median household income</span><span class="v num">${c.income||"—"}</span></div>
    <div class="kv"><span class="k">Bachelor's or higher</span><span class="v num">${c.bachelors||"—"}</span></div>
    <div class="kv"><span class="k">Poverty rate</span><span class="v num">${c.poverty||"—"}</span></div>
    <p class="note">County-level context. Many counties split across more than one congressional district, so this isn't tied to a single race.</p>`;
  document.getElementById("detail").classList.add("open");
}
/* ---------- Tabs / filters ---------- */
function setTab(t){
  tab=t;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
  const usesBoard=(t==="board"||t==="counties");
  document.getElementById("board").style.display=usesBoard?"block":"none";
  document.getElementById("svgwrap").style.display=usesBoard?"none":"block";
  document.getElementById("legend").style.display=t==="house"?"block":"none";
  document.getElementById("modebtn").style.display=t==="house"?"flex":"none";
  document.querySelector(".zoomctl").style.display=usesBoard?"none":"flex";
  redraw();
}
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
document.querySelectorAll("#modebtn button").forEach(b=>b.onclick=()=>{
  mode=b.dataset.m;
  document.querySelectorAll("#modebtn button").forEach(x=>x.classList.toggle("on",x===b));
  redraw();
});
function bindFilter(id,key){
  document.getElementById(id).addEventListener(id==="f-q"?"input":"change",e=>{
    filt[key]=(id==="f-q"?e.target.value.trim().toLowerCase():e.target.value); redraw();
  });
}
bindFilter("f-rating","rating");bindFilter("f-party","party");bindFilter("f-state","state");bindFilter("f-q","q");
const ssel=document.getElementById("f-state");
Object.keys(STATE_NAMES).sort().forEach(st=>{const o=document.createElement("option");o.value=st;o.textContent=STATE_NAMES[st];ssel.appendChild(o);});
function redraw(){
  if(tab==="house"){drawHouse();renderList();}
  else if(tab==="senate"){drawSenate();renderList();}
  else if(tab==="board"){renderBoard();renderList();}
  else if(tab==="counties"){renderCounties();}
}
header(); applyView(); setTab("house");
</script>
